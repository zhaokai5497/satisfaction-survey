<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>满意度调研</title>
  <style>
    :root {
      --blue: #055fe7;
      --text: #232a33;
      --sub: #a0a3a7;
      --line: #eef0f3;
      --soft: #f2f3f5;
      --upload: #f1f5f9;
      --star: #fed63a;
      --star-off: #d4dbe2;
      --star-mid: #889aab;
      --star-deep: #873a18;
      --danger: #ff4242;
      --toast: rgba(25, 25, 25, 0.9);
      font-family: "PingFang SC", "PingFangSC-Regular", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f7f8fa;
      color: var(--text);
      display: flex;
      justify-content: center;
      font-family: var(--font, "PingFang SC", "Microsoft YaHei", sans-serif);
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .phone {
      width: min(100vw, 414px);
      min-height: 100vh;
      background: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.5);
    }

    .status-svg {
      display: block;
      width: 100%;
      height: 44px;
      object-fit: cover;
    }

    .nav {
      height: 46px;
      display: grid;
      grid-template-columns: 52px 1fr 52px;
      align-items: center;
      padding: 0 14px;
    }

    .title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 26px;
      color: #000;
    }

    .back,
    .more {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      color: #232a33;
    }

    .back::before {
      content: "";
      width: 12px;
      height: 12px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
      margin-left: 7px;
    }

    .more {
      justify-self: end;
      gap: 3px;
      grid-auto-flow: column;
    }

    .more i {
      width: 4px;
      height: 4px;
      background: #191919;
      opacity: 0.9;
      border-radius: 50%;
      display: block;
    }

    main {
      min-height: calc(100vh - 90px);
      padding: 18px 20px 120px;
    }

    .question {
      font-size: 16px;
      line-height: 24px;
      margin: 0 0 20px;
      font-weight: 400;
      color: var(--text);
    }

    .question b {
      color: #fa3e3e;
      padding-right: 4px;
    }

    .rating {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 12px 18px;
      min-height: 62px;
    }

    .star-btn {
      width: 54px;
      height: 58px;
      position: relative;
      display: grid;
      place-items: center;
      transition: transform 180ms ease, filter 180ms ease;
      padding: 0;
    }

    .star-btn:active {
      transform: scale(0.9);
    }

    .star-icon {
      width: 50px;
      height: 50px;
      display: block;
      object-fit: contain;
      transform-origin: center;
      transition: transform 220ms cubic-bezier(.2, .8, .2, 1), filter 220ms ease;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .star-btn.is-active .star-icon {
      filter: drop-shadow(0 6px 6px rgba(254, 214, 58, 0.24));
    }

    .star-btn.is-burst .star-icon {
      animation-duration: 680ms;
      animation-delay: var(--burst-delay, 0ms);
      animation-timing-function: cubic-bezier(.16, 1.12, .3, 1);
      animation-fill-mode: both;
    }

    .star-btn.is-burst.is-sad .star-icon { animation-name: sadCascade; }
    .star-btn.is-burst.is-normal .star-icon { animation-name: normalCascade; }
    .star-btn.is-burst.is-happy .star-icon { animation-name: happyCascade; }

    .state-label {
      height: 28px;
      margin: -4px 0 10px;
      text-align: center;
      font-size: 16px;
      line-height: 24px;
      font-weight: 600;
      color: var(--text);
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .state-label.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 12px 0 0;
    }

    .row-svg-wrap {
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    .row-svg {
      display: block;
      width: calc(100% + 16px);
      height: 48px;
      margin-left: -16px;
      object-fit: cover;
    }

    .row {
      min-height: 48px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 88px 1fr 24px;
      align-items: center;
      column-gap: 8px;
      font-size: 16px;
      line-height: 24px;
    }

    .row strong {
      font-weight: 400;
      color: var(--text);
    }

    .row span {
      color: var(--sub);
    }

    .row .selected {
      color: var(--text);
      font-weight: 600;
    }

    .chev {
      width: 10px;
      height: 10px;
      border-right: 1.5px solid #dbdde0;
      border-top: 1.5px solid #dbdde0;
      transform: rotate(45deg);
      justify-self: end;
    }

    .block {
      border-bottom: 1px solid var(--line);
      padding: 16px 0 14px;
    }

    .block h2 {
      margin: 0 0 12px;
      font-size: 16px;
      line-height: 24px;
      font-weight: 400;
      color: var(--text);
    }

    .hint {
      color: var(--sub);
      font-size: 12px;
      line-height: 18px;
      margin: 0;
    }

    textarea {
      width: 100%;
      height: 94px;
      border: 0;
      resize: none;
      outline: none;
      padding: 0;
      margin: 0;
      color: var(--text);
      font-size: 14px;
      line-height: 24px;
    }

    textarea::placeholder {
      color: #999;
    }

    .counter {
      text-align: right;
      color: rgba(0, 0, 0, 0.4);
      font-size: 12px;
      line-height: 20px;
      margin-top: 2px;
    }

    .error {
      min-height: 20px;
      color: var(--danger);
      font-size: 13px;
      line-height: 20px;
      margin-top: 6px;
      opacity: 0;
      transform: translateY(-2px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .error.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .upload-copy {
      margin-bottom: 12px;
    }

    .upload-box {
      width: 114px;
      height: 114px;
      background: var(--upload);
      border-radius: 4px;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .upload-box::before,
    .upload-box::after {
      content: "";
      position: absolute;
      background: var(--sub);
      border-radius: 1px;
    }

    .upload-box::before {
      width: 26px;
      height: 2px;
    }

    .upload-box::after {
      width: 2px;
      height: 26px;
    }

    .upload-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      position: relative;
      z-index: 2;
    }

    .upload-box.has-image::before,
    .upload-box.has-image::after {
      display: none;
    }

    .upload-box.has-image img {
      display: block;
    }

    .tags {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 8px 0 18px;
      border-bottom: 1px solid var(--line);
    }

    .tag {
      height: 34px;
      border-radius: 4px;
      background: var(--soft);
      color: var(--sub);
      font-size: 12px;
      line-height: 18px;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .tag.is-selected {
      background: #e4f0ff;
      color: var(--blue);
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px rgba(5, 95, 231, 0.12);
    }

    .panel {
      display: none;
      animation: fadeUp 220ms ease both;
    }

    .panel.is-active {
      display: block;
    }

    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: #fff;
      padding: 12px 20px calc(14px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
    }

    .submit {
      width: 100%;
      height: 48px;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font-size: 16px;
      font-weight: 400;
      transition: transform 120ms ease, background 160ms ease;
    }

    .submit:active {
      transform: scale(0.985);
      background: #075bd0;
    }

    .home-indicator {
      width: 146px;
      height: 5px;
      background: #000;
      border-radius: 5px;
      margin: 24px auto 0;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 116px;
      transform: translate(-50%, 12px);
      min-width: 88px;
      height: 50px;
      padding: 0 18px;
      border-radius: 4px;
      background: var(--toast);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 20;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .sparkle {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      background: var(--star);
      animation: sparkle 620ms ease-out forwards;
      z-index: 10;
    }

    @keyframes sadCascade {
      0% {
        transform: scale(0.76) translateY(0) rotate(-8deg);
        filter: drop-shadow(0 0 0 rgba(254, 214, 58, 0));
      }
      28% {
        transform: scale(var(--burst-scale, 1.06)) translateY(calc(-1 * var(--burst-rise, 6px))) rotate(calc(var(--burst-tilt, 4deg) * -1));
        filter: drop-shadow(0 8px 8px rgba(135, 58, 24, 0.12));
      }
      54% {
        transform: scale(0.96) translateY(1px) rotate(var(--burst-tilt, 4deg));
      }
      74% {
        transform: scale(1.02) translateY(calc(var(--burst-rise, 6px) * -0.18)) rotate(calc(var(--burst-tilt, 4deg) * -0.35));
      }
      100% {
        transform: scale(1) translateY(0) rotate(0);
        filter: drop-shadow(0 6px 6px rgba(254, 214, 58, 0.24));
      }
    }

    @keyframes normalCascade {
      0% {
        transform: scale(0.8) translateY(0);
        filter: drop-shadow(0 0 0 rgba(254, 214, 58, 0));
      }
      30% {
        transform: scale(var(--burst-scale, 1.08)) translateY(calc(-1 * var(--burst-rise, 7px)));
        filter: drop-shadow(0 10px 10px rgba(136, 154, 171, 0.14));
      }
      58% {
        transform: scale(0.97) translateY(1px);
      }
      80% {
        transform: scale(1.02) translateY(calc(var(--burst-rise, 7px) * -0.18));
      }
      100% {
        transform: scale(1) translateY(0);
        filter: drop-shadow(0 6px 6px rgba(254, 214, 58, 0.24));
      }
    }

    @keyframes happyCascade {
      0% {
        transform: scale(0.76) translateY(0);
        filter: drop-shadow(0 0 0 rgba(254, 214, 58, 0));
      }
      34% {
        transform: scale(var(--burst-scale, 1.14)) translateY(calc(-1 * var(--burst-rise, 8px)));
        filter: drop-shadow(0 12px 12px rgba(244, 68, 68, 0.2));
      }
      62% {
        transform: scale(0.98) translateY(1px);
      }
      82% {
        transform: scale(1.03) translateY(calc(var(--burst-rise, 8px) * -0.22));
      }
      100% {
        transform: scale(1) translateY(0);
        filter: drop-shadow(0 6px 6px rgba(254, 214, 58, 0.24));
      }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes sparkle {
      from { opacity: 1; transform: translate(0, 0) scale(1); }
      to { opacity: 0; transform: translate(var(--x), var(--y)) scale(0.2); }
    }

    @media (min-width: 680px) {
      body {
        padding: 24px;
      }

      .phone {
        min-height: 844px;
      }
    }
  </style>
</head>
<body>
  <div class="phone">
    <header>
      <img class="status-svg" src="assets/status-bar.svg" alt="手机状态栏">
      <div class="nav">
        <button class="back" type="button" aria-label="返回"></button>
        <div class="title">满意度调研</div>
        <button class="more" type="button" aria-label="更多"><i></i><i></i><i></i></button>
      </div>
    </header>

    <main>
      <p class="question"><b>*</b>请选择你对萝卜工作台的满意度</p>

      <section class="rating" aria-label="满意度评分">
        <button class="star-btn" type="button" data-score="1" aria-label="非常不满意"><img class="star-icon" alt="" src="assets/star-unselected-1.svg"></button>
        <button class="star-btn" type="button" data-score="2" aria-label="不满意"><img class="star-icon" alt="" src="assets/star-unselected-2.svg"></button>
        <button class="star-btn" type="button" data-score="3" aria-label="一般"><img class="star-icon" alt="" src="assets/star-unselected-3.svg"></button>
        <button class="star-btn" type="button" data-score="4" aria-label="满意"><img class="star-icon" alt="" src="assets/star-unselected-4.svg"></button>
        <button class="star-btn" type="button" data-score="5" aria-label="非常满意"><img class="star-icon" alt="" src="assets/star-unselected-5.svg"></button>
      </section>

      <div class="state-label" id="stateLabel"></div>

      <section class="panel is-active" id="problemPanel">
        <div class="divider"></div>
        <div class="row-svg-wrap">
          <img class="row-svg" src="assets/problem-module-row.svg" alt="问题模块 地勤任务中心">
        </div>
        <div class="row-svg-wrap">
          <img class="row-svg" src="assets/problem-type-row.svg" alt="问题类型 请选择">
        </div>

        <div class="block">
          <h2>描述你遇到的问题</h2>
          <textarea id="problemText" maxlength="300" placeholder="请详细描述你遇到的问题或改进的建议（5个字以上）"></textarea>
          <div class="counter"><span id="problemCount">0</span>/300</div>
          <div class="error" id="problemError">请至少输入5个字的问题描述</div>
        </div>

        <div class="block">
          <h2>上传截图</h2>
          <p class="hint upload-copy">请上传jpg/gif/jpeg/png/bmp格式图片，单个图片大小不超过10MB，数量不超过9个</p>
          <label class="upload-box" id="uploadBox">
            <input id="fileInput" type="file" accept="image/jpg,image/jpeg,image/png,image/gif,image/bmp" hidden>
            <img id="preview" alt="">
          </label>
        </div>
      </section>

      <section class="panel" id="praisePanel">
        <div class="tags" aria-label="满意标签">
          <button class="tag" type="button">信息呈现清晰</button>
          <button class="tag" type="button">操作顺畅</button>
          <button class="tag" type="button">界面美观</button>
          <button class="tag" type="button">功能完备</button>
          <button class="tag" type="button">响应速度快</button>
          <button class="tag" type="button">核心信息突出</button>
        </div>

        <div class="block">
          <h2>我们期待你的建议</h2>
          <textarea id="suggestText" maxlength="300" placeholder="请详细描述你的建议（5个字以上）"></textarea>
          <div class="counter"><span id="suggestCount">0</span>/300</div>
          <div class="error" id="suggestError">请至少输入5个字的建议</div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <button class="submit" type="button" id="submitBtn">提交</button>
      <div class="home-indicator" aria-hidden="true"></div>
    </footer>
  </div>

  <div class="toast" id="toast">提交成功</div>

  <script>
    const labels = {
      1: "非常不满意",
      2: "不满意",
      3: "一般",
      4: "满意",
      5: "非常满意"
    };

    const starButtons = [...document.querySelectorAll(".star-btn")];
    const problemPanel = document.querySelector("#problemPanel");
    const praisePanel = document.querySelector("#praisePanel");
    const stateLabel = document.querySelector("#stateLabel");
    const submitBtn = document.querySelector("#submitBtn");
    const toast = document.querySelector("#toast");
    const problemText = document.querySelector("#problemText");
    const suggestText = document.querySelector("#suggestText");
    const problemCount = document.querySelector("#problemCount");
    const suggestCount = document.querySelector("#suggestCount");
    const problemError = document.querySelector("#problemError");
    const suggestError = document.querySelector("#suggestError");
    const uploadBox = document.querySelector("#uploadBox");
    const fileInput = document.querySelector("#fileInput");
    const preview = document.querySelector("#preview");
    const tags = [...document.querySelectorAll(".tag")];
    let score = 0;
    let toastTimer;

    function starAsset(value, active) {
      const assetScore = active ? score : value;
      return `assets/star-${active ? "selected" : "unselected"}-${assetScore}.svg`;
    }

    function moodClass(value) {
      if (!score || value > score) return "";
      if (score <= 2) return "is-sad";
      if (score === 3) return "is-normal";
      return "is-happy";
    }

    function renderRating(activeButton) {
      const activeScore = score;
      starButtons.forEach((button) => {
        const value = Number(button.dataset.score);
        const icon = button.querySelector(".star-icon");
        button.className = "star-btn";
        button.style.removeProperty("--burst-delay");
        button.style.removeProperty("--burst-scale");
        button.style.removeProperty("--burst-rise");
        button.style.removeProperty("--burst-tilt");
        if (score && value <= score) {
          button.classList.add("is-active", moodClass(value));
        }
        if (icon) {
          icon.src = starAsset(value, score && value <= score);
        }
        button.setAttribute("aria-pressed", String(score === value));
      });

      if (activeScore) {
        const litButtons = starButtons.filter((button) => Number(button.dataset.score) <= activeScore);
        const total = litButtons.length;
        litButtons.forEach((button, index) => {
          const progress = total === 1 ? 1 : (index + 1) / total;
          const delay = index * 72;
          const scale = 1.02 + progress * 0.14;
          const rise = 4 + progress * 8;
          const tilt = score <= 2 ? 1 + progress * 7 : 0;
          button.classList.add("is-burst");
          button.style.setProperty("--burst-delay", `${delay}ms`);
          button.style.setProperty("--burst-scale", scale.toFixed(3));
          button.style.setProperty("--burst-rise", `${rise.toFixed(2)}px`);
          button.style.setProperty("--burst-tilt", `${tilt.toFixed(2)}deg`);
          setTimeout(() => {
            button.classList.remove("is-burst");
            button.style.removeProperty("--burst-delay");
            button.style.removeProperty("--burst-scale");
            button.style.removeProperty("--burst-rise");
            button.style.removeProperty("--burst-tilt");
          }, 860 + delay);
        });
      }

      stateLabel.textContent = score ? labels[score] : "";
      stateLabel.classList.toggle("is-visible", Boolean(score));
      problemPanel.classList.toggle("is-active", score < 4);
      praisePanel.classList.toggle("is-active", score >= 4);

      if (score >= 4 && activeButton) {
        sparkle(activeButton);
      }
    }

    function sparkle(anchor) {
      const rect = anchor.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const points = [[-36, -34], [31, -28], [-24, 24], [29, 30], [2, -42]];

      points.forEach(([x, y]) => {
        const dot = document.createElement("span");
        dot.className = "sparkle";
        dot.style.left = `${centerX}px`;
        dot.style.top = `${centerY}px`;
        dot.style.setProperty("--x", `${x}px`);
        dot.style.setProperty("--y", `${y}px`);
        document.body.appendChild(dot);
        setTimeout(() => dot.remove(), 650);
      });
    }

    function countText(textarea, counter) {
      counter.textContent = textarea.value.length;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("is-visible");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("is-visible"), 1600);
    }

    function setError(el, visible) {
      el.classList.toggle("is-visible", visible);
    }

    starButtons.forEach((button) => {
      button.addEventListener("click", () => {
        score = Number(button.dataset.score);
        setError(problemError, false);
        setError(suggestError, false);
        renderRating(button);
      });
    });

    problemText.addEventListener("input", () => {
      countText(problemText, problemCount);
      setError(problemError, false);
    });

    suggestText.addEventListener("input", () => {
      countText(suggestText, suggestCount);
      setError(suggestError, false);
    });

    tags.forEach((tag) => {
      tag.addEventListener("click", () => {
        tag.classList.toggle("is-selected");
      });
    });

    fileInput.addEventListener("change", () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      preview.src = URL.createObjectURL(file);
      uploadBox.classList.add("has-image");
    });

    submitBtn.addEventListener("click", () => {
      if (!score) {
        showToast("请选择满意度");
        return;
      }

      if (score < 4) {
        const invalid = problemText.value.trim().length < 5;
        setError(problemError, invalid);
        if (invalid) return;
      } else {
        const invalid = suggestText.value.trim().length < 5;
        setError(suggestError, invalid);
        if (invalid) return;
      }

      showToast("提交成功");
    });

    renderRating();
  </script>
</body>
</html>
